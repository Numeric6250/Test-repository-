<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Gradient for the night sky background -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0e2d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b69;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effect for the monitor -->
    <radialGradient id="monitorGlow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0" />
    </radialGradient>
    <!-- Gradient for the monitor screen -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e" />
      <stop offset="100%" style="stop-color:#11111b" />
    </linearGradient>
    <!-- River gradient -->
    <linearGradient id="riverGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.1" />
      <stop offset="30%" style="stop-color:#4fc3f7;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#7c4dff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:0.1" />
    </linearGradient>
    <!-- Star twinkle filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Text glow filter -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Branch/tree gradient -->
    <linearGradient id="branchGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4a7c59" />
      <stop offset="100%" style="stop-color:#81c784" />
    </linearGradient>
  </defs>

  <!-- Background: Night sky -->
  <rect width="800" height="500" fill="url(#skyGradient)" rx="12" ry="12" />

  <!-- Stars scattered across the sky -->
  <g filter="url(#starGlow)" opacity="0.8">
    <circle cx="50" cy="40" r="1.5" fill="#ffffff" />
    <circle cx="120" cy="80" r="1" fill="#e0e0ff" />
    <circle cx="200" cy="30" r="1.8" fill="#ffffff" />
    <circle cx="310" cy="60" r="1.2" fill="#ffe0b2" />
    <circle cx="450" cy="25" r="1.5" fill="#ffffff" />
    <circle cx="520" cy="70" r="1" fill="#e0e0ff" />
    <circle cx="600" cy="45" r="1.8" fill="#ffffff" />
    <circle cx="700" cy="35" r="1.3" fill="#ffe0b2" />
    <circle cx="750" cy="80" r="1" fill="#ffffff" />
    <circle cx="80" cy="130" r="1" fill="#ffffff" />
    <circle cx="170" cy="110" r="1.5" fill="#e0e0ff" />
    <circle cx="650" cy="100" r="1.2" fill="#ffffff" />
    <circle cx="380" cy="95" r="1" fill="#ffe0b2" />
    <circle cx="560" cy="120" r="1.5" fill="#ffffff" />
    <circle cx="30" cy="200" r="1" fill="#e0e0ff" />
    <circle cx="770" cy="180" r="1.3" fill="#ffffff" />
    <circle cx="90" cy="280" r="1" fill="#ffffff" />
    <circle cx="720" cy="250" r="1.2" fill="#e0e0ff" />
  </g>

  <!-- Monitor glow aura -->
  <ellipse cx="400" cy="280" rx="200" ry="150" fill="url(#monitorGlow)" />

  <!-- Git branch tree (left side) -->
  <g stroke="url(#branchGradient)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Main trunk -->
    <path d="M100,480 L100,200" opacity="0.7" />
    <!-- Branch 1 -->
    <path d="M100,350 Q130,340 150,310" opacity="0.6" />
    <!-- Branch 2 -->
    <path d="M100,280 Q80,260 60,230" opacity="0.6" />
    <!-- Branch 3 (merge back) -->
    <path d="M150,310 Q140,270 100,250" opacity="0.5" />
    <!-- Small branch -->
    <path d="M100,400 Q120,390 135,370" opacity="0.5" />
  </g>
  <!-- Commit dots on branches -->
  <g fill="#81c784" opacity="0.8">
    <circle cx="100" cy="350" r="4" />
    <circle cx="100" cy="280" r="4" />
    <circle cx="150" cy="310" r="4" />
    <circle cx="60" cy="230" r="4" />
    <circle cx="100" cy="250" r="4" />
    <circle cx="100" cy="200" r="4" />
    <circle cx="135" cy="370" r="4" />
    <circle cx="100" cy="400" r="4" />
  </g>

  <!-- Git branch tree (right side) -->
  <g stroke="url(#branchGradient)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M700,480 L700,220" opacity="0.7" />
    <path d="M700,370 Q730,355 745,330" opacity="0.6" />
    <path d="M700,300 Q670,280 655,250" opacity="0.6" />
    <path d="M745,330 Q730,290 700,270" opacity="0.5" />
  </g>
  <g fill="#81c784" opacity="0.8">
    <circle cx="700" cy="370" r="4" />
    <circle cx="700" cy="300" r="4" />
    <circle cx="745" cy="330" r="4" />
    <circle cx="655" cy="250" r="4" />
    <circle cx="700" cy="270" r="4" />
    <circle cx="700" cy="220" r="4" />
  </g>

  <!-- Code river flowing at the bottom -->
  <path d="M0,460 Q100,440 200,455 Q300,470 400,450 Q500,430 600,450 Q700,470 800,455"
        stroke="url(#riverGradient)" stroke-width="3" fill="none" opacity="0.6" />
  <path d="M0,470 Q100,450 200,465 Q300,480 400,460 Q500,440 600,460 Q700,480 800,465"
        stroke="url(#riverGradient)" stroke-width="2" fill="none" opacity="0.4" />
  <path d="M0,480 Q100,465 200,475 Q300,485 400,470 Q500,455 600,470 Q700,485 800,475"
        stroke="url(#riverGradient)" stroke-width="1.5" fill="none" opacity="0.3" />

  <!-- Monitor -->
  <g>
    <!-- Monitor stand -->
    <rect x="370" y="380" width="60" height="30" fill="#2a2a3d" rx="2" />
    <rect x="340" y="405" width="120" height="8" fill="#2a2a3d" rx="4" />
    <!-- Monitor body -->
    <rect x="260" y="200" width="280" height="185" fill="#2a2a3d" rx="8" ry="8" />
    <!-- Screen -->
    <rect x="272" y="212" width="256" height="155" fill="url(#screenGradient)" rx="4" ry="4" />

    <!-- Code lines on screen -->
    <g opacity="0.9">
      <!-- Line numbers -->
      <text x="282" y="235" font-family="monospace" font-size="9" fill="#6c6c8a">1</text>
      <text x="282" y="250" font-family="monospace" font-size="9" fill="#6c6c8a">2</text>
      <text x="282" y="265" font-family="monospace" font-size="9" fill="#6c6c8a">3</text>
      <text x="282" y="280" font-family="monospace" font-size="9" fill="#6c6c8a">4</text>
      <text x="282" y="295" font-family="monospace" font-size="9" fill="#6c6c8a">5</text>
      <text x="282" y="310" font-family="monospace" font-size="9" fill="#6c6c8a">6</text>
      <text x="282" y="325" font-family="monospace" font-size="9" fill="#6c6c8a">7</text>
      <text x="282" y="340" font-family="monospace" font-size="9" fill="#6c6c8a">8</text>
      <text x="282" y="355" font-family="monospace" font-size="9" fill="#6c6c8a">9</text>

      <!-- Code syntax highlighting -->
      <!-- def write_poem(): -->
      <text x="298" y="235" font-family="monospace" font-size="9" fill="#c792ea">def</text>
      <text x="322" y="235" font-family="monospace" font-size="9" fill="#82aaff">write_poem</text>
      <text x="382" y="235" font-family="monospace" font-size="9" fill="#89ddff">():</text>

      <!-- lines = [] -->
      <text x="308" y="250" font-family="monospace" font-size="9" fill="#f07178">lines</text>
      <text x="340" y="250" font-family="monospace" font-size="9" fill="#89ddff">=</text>
      <text x="350" y="250" font-family="monospace" font-size="9" fill="#89ddff">[]</text>

      <!-- for verse in heart: -->
      <text x="308" y="265" font-family="monospace" font-size="9" fill="#c792ea">for</text>
      <text x="330" y="265" font-family="monospace" font-size="9" fill="#f07178">verse</text>
      <text x="360" y="265" font-family="monospace" font-size="9" fill="#c792ea">in</text>
      <text x="376" y="265" font-family="monospace" font-size="9" fill="#f07178">heart</text>
      <text x="401" y="265" font-family="monospace" font-size="9" fill="#89ddff">:</text>

      <!--   lines.append(verse) -->
      <text x="318" y="280" font-family="monospace" font-size="9" fill="#f07178">lines</text>
      <text x="345" y="280" font-family="monospace" font-size="9" fill="#89ddff">.</text>
      <text x="350" y="280" font-family="monospace" font-size="9" fill="#82aaff">append</text>
      <text x="386" y="280" font-family="monospace" font-size="9" fill="#89ddff">(</text>
      <text x="392" y="280" font-family="monospace" font-size="9" fill="#f07178">verse</text>
      <text x="418" y="280" font-family="monospace" font-size="9" fill="#89ddff">)</text>

      <!-- (blank line) -->

      <!-- commit(lines) -->
      <text x="298" y="310" font-family="monospace" font-size="9" fill="#82aaff">commit</text>
      <text x="336" y="310" font-family="monospace" font-size="9" fill="#89ddff">(</text>
      <text x="342" y="310" font-family="monospace" font-size="9" fill="#f07178">lines</text>
      <text x="370" y="310" font-family="monospace" font-size="9" fill="#89ddff">)</text>

      <!-- push(to="world") -->
      <text x="298" y="325" font-family="monospace" font-size="9" fill="#82aaff">push</text>
      <text x="322" y="325" font-family="monospace" font-size="9" fill="#89ddff">(</text>
      <text x="328" y="325" font-family="monospace" font-size="9" fill="#f07178">to</text>
      <text x="340" y="325" font-family="monospace" font-size="9" fill="#89ddff">=</text>
      <text x="348" y="325" font-family="monospace" font-size="9" fill="#c3e88d">"world"</text>
      <text x="388" y="325" font-family="monospace" font-size="9" fill="#89ddff">)</text>

      <!-- return "beauty" -->
      <text x="298" y="340" font-family="monospace" font-size="9" fill="#c792ea">return</text>
      <text x="336" y="340" font-family="monospace" font-size="9" fill="#c3e88d">"beauty"</text>

      <!-- Cursor blinking line -->
      <rect x="298" y="348" width="6" height="10" fill="#4fc3f7" opacity="0.7" />
    </g>

    <!-- Monitor power LED -->
    <circle cx="400" cy="392" r="2" fill="#4fc3f7" opacity="0.8" />
  </g>

  <!-- Title text at the top -->
  <text x="400" y="160" font-family="Georgia, serif" font-size="32" fill="#e0e0ff"
        text-anchor="middle" filter="url(#textGlow)" opacity="0.9">
    The Coder's Poem
  </text>
  <text x="400" y="180" font-family="Georgia, serif" font-size="12" fill="#9e9ebb"
        text-anchor="middle" letter-spacing="4">
    where code meets poetry
  </text>

  <!-- Floating code symbols -->
  <g font-family="monospace" font-size="14" opacity="0.15" fill="#4fc3f7">
    <text x="180" y="250" transform="rotate(-15,180,250)">&lt;/&gt;</text>
    <text x="620" y="230" transform="rotate(10,620,230)">{ }</text>
    <text x="200" y="400" transform="rotate(-8,200,400)">git</text>
    <text x="590" y="410" transform="rotate(12,590,410)">#!</text>
    <text x="160" y="330" transform="rotate(5,160,330)">0x</text>
    <text x="640" y="340" transform="rotate(-10,640,340)">=&gt;</text>
  </g>

  <!-- Subtle border glow -->
  <rect width="800" height="500" fill="none" stroke="#4fc3f7" stroke-width="1" rx="12" ry="12" opacity="0.15" />
</svg>